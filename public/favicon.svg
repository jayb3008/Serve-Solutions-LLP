<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="geometricPrecision">

  <!-- Background: dark rounded square matching the navbar logo mark -->
  <rect width="32" height="32" rx="7" fill="#121518"/>

  <!--
    S lettermark drawn as two smooth bezier paths.
    Top half  → accent orange  (#ff5b2e)
    Bottom half → warm cream   (#f4efe6)
    Both share a common midpoint at (16, 15.5) for a seamless join.
  -->

  <!-- Top half of the S (orange) -->
  <path
    d="M 21.5 7.5
       C 21.5 5   19.5 4   16.5 4
       C 13   4   10   5.5 10   9
       C 10   12.5 13  14  16.5 15.5"
    fill="none"
    stroke="#e31e24"
    stroke-width="4.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Bottom half of the S (cream) -->
  <path
    d="M 16.5 15.5
       C 20   17   22  18.5 22  22
       C 22   25.5 19  28   16  28
       C 13   28   10.5 27  10.5 24.5"
    fill="none"
    stroke="#ffffff"
    stroke-width="4.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

</svg>
